# Picom Compositor Configuration - Optimized for Sandy Bridge HD 3000
backend = "xrender";
vsync = true;
use-damage = true;

# Fading (Transitions)
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 15; # Optimized delta to reduce frame rendering overhead

# Opacity (Transparency)
inactive-opacity = 0.88;
inactive-dim = 0.05;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;

# Make lockscreen completely opaque
focus-exclude = [
  "class_g = 'i3lock'"
];
opacity-rule = [
  "100:class_g = 'i3lock'"
];

# Shadows (Clean, lightweight depth)
shadow = true;
shadow-radius = 4;      # Reduced from 8 to optimize paint operations
shadow-offset-x = -3;   # Reduced from -6
shadow-offset-y = -3;   # Reduced from -6
shadow-opacity = 0.3;   # Lowered alpha complexity from 0.4
shadow-exclude = [
  "name = 'Notification'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Window Type Specific Rules to bypass shadowing on desktop panels/docks
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 1.0; shadow = false; };
  dropdown_menu = { opacity = 1.0; shadow = false; };
};
