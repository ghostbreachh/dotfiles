[window]
padding = { x = 12, y = 12 }
decorations = "full"
opacity = 0.92

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
size = 9.5

[colors.primary]
background = "#09050e"
foreground = "#ebd9fc"

[colors.cursor]
text = "#09050e"
cursor = "#9f52f0"

[colors.normal]
black = "#1a1226"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#ebd9fc"

[colors.bright]
black = "#4d3968"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"
