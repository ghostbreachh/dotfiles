# Polybar Configuration - Majestic Floating Purple Pill Edition
# Single unified capsule floating bar

[colors]
background = #100b19
background-alt = #1b122c
foreground = #ebd9fc
primary = #b380f7
secondary = #7b32d6
alert = #ff6688
success = #50e3c2
warning = #f3b05a

[bar/main]
width = 98%
height = 28pt
offset-x = 1%
offset-y = 10px
bottom = true
radius = 14px
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 2pt
border-color = ${colors.primary}

padding-left = 2
padding-right = 2
module-margin = 1

separator = |
separator-foreground = ${colors.secondary}

# Load Nerd Fonts for status icons
font-0 = FiraCode Nerd Font:size=9;2
font-1 = FiraCode Nerd Font:size=10;3

modules-left = xworkspaces xwindow
modules-center = companion
modules-right = wlan volume battery cpu_temp redshift powermenu date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.secondary}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
label-foreground = ${colors.secondary}

[module/wlan]
type = internal/network
interface = wlan0
interval = 5.0

format-connected = <ramp-signal> <label-connected>
label-connected = " %essid% ¾░ōģ %downspeed% "
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
label-disconnected = " ¾░¢¬ Down "
label-disconnected-foreground = ${colors.alert}

ramp-signal-0 = ¾░ż»
ramp-signal-1 = ¾░ż¤
ramp-signal-2 = ¾░żó
ramp-signal-3 = ¾░żź
ramp-signal-4 = ¾░ż©
ramp-signal-foreground = ${colors.primary}

[module/volume]
type = internal/pulseaudio
use-ui-max = false

# Left click opens alsamixer in a floating terminal
format-volume = %{A1:alacritty -t "Volume Control" -e alsamixer:}<label-volume>%{A}
label-volume = " ¾░ĢŠ %percentage%% "
label-volume-foreground = ${colors.foreground}

format-muted = %{A1:alacritty -t "Volume Control" -e alsamixer:}<label-muted>%{A}
label-muted = " ¾░Ø¤ Muted "
label-muted-foreground = ${colors.alert}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC
poll-interval = 5

# Left click opens upower details in a floating terminal
format-charging = %{A1:alacritty -t "Battery Details" -e bash -c "upower -i /org/freedesktop/UPower/devices/battery_BAT0; read -p 'Press Enter to close...'":}<label-charging>%{A}
label-charging = " ŌÜĪ %percentage%% "
label-charging-foreground = ${colors.foreground}

format-discharging = %{A1:alacritty -t "Battery Details" -e bash -c "upower -i /org/freedesktop/UPower/devices/battery_BAT0; read -p 'Press Enter to close...'":}<label-discharging>%{A}
label-discharging = " ­¤öŗ %percentage%% "
label-discharging-foreground = ${colors.foreground}

label-full = " ¾░ü╣ Full "
label-full-foreground = ${colors.success}

[module/cpu_temp]
type = internal/temperature
thermal-zone = 0
warn-temperature = 75
interval = 5

format = <ramp> <label>
format-warn = <ramp> <label-warn>

label = " %temperature-c% "
label-foreground = ${colors.foreground}

label-warn = " %temperature-c% "
label-warn-foreground = ${colors.alert}

ramp-0 = ¾░öÅ
ramp-1 = ¾░öÅ
ramp-2 = ¾░öÅ
ramp-foreground = ${colors.primary}

[module/redshift]
type = custom/script
exec = pgrep -x redshift >/dev/null && echo "%{F#f3b05a}¾░ø© Night%{F-}" || echo "%{F#b380f7}¾░ø® Day%{F-}"
interval = 10
click-left = bash -c "pgrep -x redshift >/dev/null && killall redshift || (redshift -l 31.5:74.3 -t 5700:3600 &)"

[module/date]
type = internal/date
interval = 5

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = " ¾░źö %date% "
label-foreground = ${colors.foreground}

[module/companion]
type = custom/text
format = " ¾░ĆÜ VENUS "
format-foreground = ${colors.primary}
format-background = ${colors.background-alt}
format-underline = ${colors.primary}
click-left = ~/.local/bin/toggle_companion.sh

[module/powermenu]
type = custom/text
format = " ¾░Éź "
format-foreground = ${colors.alert}
click-left = bash -c "echo -e 'Lock\nLogout\nSuspend\nReboot\nShutdown' | rofi -dmenu -i -p 'Power Menu' | xargs -I {} bash -c 'case {} in Lock) ~/.local/bin/blur_lock.sh;; Logout) i3-msg exit;; Suspend) systemctl suspend;; Reboot) systemctl reboot;; Shutdown) systemctl poweroff;; esac'"
